<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>


  <header class="navbar">
    <div class="logo"></div>

    <div class="nav-menu">
      <a>Vehicles</a>
      <a>Energy</a>
      <a>Charging</a>
      <a>Discover</a>
      <a>Shop</a>
    </div>

    <div class="nav-icon">
      <i class="fa-regular fa-circle-question"></i>
      <i class="fa-solid fa-globe"></i>
      <i class="fa-regular fa-circle-user"></i>
    </div>
  </header>

 
  <section class="section hero">
    <div class="content">
      <h1>Model Y</h1>
      <p>0% APR Available</p>

      <div class="buttons">
        <button class="primary">Order Now</button>
        <button class="secondary">View Inventory</button>
      </div>
    </div>
  </section>

 
  <section class="section model3">
    <div class="content">
      <h1>Model 3</h1>
      <p>Order Online for Touchless Delivery</p>

      <div class="buttons">
        <button class="primary">Order Now</button>
        <button class="secondary">Learn More</button>
      </div>
    </div>
  </section>

 
  <section class="section models">
    <div class="content">
      <h1>Model S</h1>
      <p>Luxury Sedan</p>

      <div class="buttons">
        <button class="primary">Order Now</button>
        <button class="secondary">Learn More</button>
      </div>
    </div>
  </section>


  <section class="section modelx">
    <div class="content">
      <h1>Model X</h1>
      <p>Luxury SUV</p>

      <div class="buttons">
        <button class="primary">Order Now</button>
        <button class="secondary">Learn More</button>
      </div>
    </div>
  </section>


  <section class="grid-section">
    <div class="grid">

      <div class="card">
        <img src="tsp1.avif">
        <h2>Model 3</h2>
      </div>

      <div class="card">
        <img src="tsp2.avif">
        <h2>Model Y</h2>
      </div>

      <div class="card">
        <img src="tsp3.avif">
        <h2>Model X</h2>
      </div>

      <div class="card">
        <img src="tsp4.avif">
        <h2>Model S</h2>
      </div>

    </div>
  </section>

  
  <footer class="footer">
    <p>© 2026 Tesla Clone | Beginner Project</p>
  </footer>

</body>
</html>
